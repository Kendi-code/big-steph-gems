{% extends 'shop/base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
    <div class="flex flex-col md:flex-row gap-16 items-center">
        
        <div class="md:w-1/2 w-full">
            <div class="rounded-xl overflow-hidden shadow-[0_20px_40px_rgb(0,0,0,0.08)] border border-gray-100 bg-white p-2">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-auto object-cover rounded-lg">
                {% endif %}
            </div>
        </div>

        <div class="md:w-1/2 flex flex-col justify-center">
            <h1 class="text-4xl md:text-5xl font-serif text-slate-900 mb-4">{{ product.name }}</h1>
            <p class="text-2xl text-slate-500 mb-8 font-medium">₦{{ product.price }}</p>
            
            <div class="prose prose-slate mb-12 text-slate-600 font-light leading-relaxed">
                {{ product.details|linebreaks }}
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/2348000000000?text=Hello%20Big%20Steph%20Gems!%20I%20am%20interested%20in%20purchasing%20the%20*{{ product.name|urlencode }}*%20for%20%E2%82%A6{{ product.price }}." 
                   target="_blank" 
                   class="w-full flex items-center justify-center gap-3 bg-[#25D366] hover:bg-[#1ebe57] text-white px-8 py-4 rounded-md font-semibold uppercase text-sm tracking-wider transition duration-300 shadow-[0_8px_20px_rgba(37,211,102,0.25)] hover:shadow-[0_12px_25px_rgba(37,211,102,0.4)]">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    Purchase via WhatsApp
                </a>

                <a href="mailto:contact@bigstephgems.com?subject=Purchase Inquiry: {{ product.name }}" 
                   class="w-full flex items-center justify-center gap-3 border border-slate-300 hover:border-slate-900 text-slate-700 hover:text-slate-900 px-8 py-4 rounded-md font-semibold uppercase text-sm tracking-wider transition duration-300 bg-white/50">
                    <i class="fa-solid fa-envelope text-lg"></i>
                    Inquire via Email
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
