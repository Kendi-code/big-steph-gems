<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG STEPH GEMS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans antialiased">

    <nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-yellow-700/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0">
                    <a href="/" class="text-2xl font-serif font-bold text-yellow-500 tracking-widest uppercase">
                        Big Steph Gems
                    </a>
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-300 hover:text-yellow-500 transition duration-300 uppercase text-sm tracking-wider">Collection</a>
                    <a href="#" class="text-gray-300 hover:text-yellow-500 transition duration-300 uppercase text-sm tracking-wider">About</a>
                </div>

                <div class="md:hidden flex items-center">
                    <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-yellow-500 hover:text-yellow-400 focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-neutral-900 border-b border-yellow-700/30">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="/" class="block px-3 py-2 text-gray-300 hover:text-yellow-500 uppercase tracking-wider text-sm">Collection</a>
                <a href="#" class="block px-3 py-2 text-gray-300 hover:text-yellow-500 uppercase tracking-wider text-sm">About</a>
            </div>
        </div>
    </nav>


    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
        <div class="flex flex-col md:flex-row gap-12">
            
            <div class="md:w-1/2">
                <div class="rounded-lg overflow-hidden shadow-2xl border border-neutral-800">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-auto object-cover">
                    {% endif %}
                </div>
            </div>

            <div class="md:w-1/2 flex flex-col justify-center">
                <h1 class="text-4xl font-serif text-yellow-500 mb-4">{{ product.name }}</h1>
                <p class="text-3xl text-gray-200 mb-6 font-light">₦{{ product.price }}</p>
                
                <div class="prose prose-invert mb-10 text-gray-400 font-light leading-relaxed">
                    {{ product.details|linebreaks }}
                </div>

                <div class="space-y-4">
                    <a href="https://wa.me/2348148543773?text=Hello%20Big%20Steph%20Gems!%20I%20am%20interested%20in%20purchasing%20the%20*{{ product.name|urlencode }}*%20for%20%E2%82%A6{{ product.price }}." 
                       target="_blank" 
                       class="w-full flex items-center justify-center gap-3 bg-[#25D366] hover:bg-[#1ebe57] text-white px-8 py-4 rounded font-bold uppercase tracking-wider transition duration-300 shadow-lg shadow-green-900/50">
                        <i class="fa-brands fa-whatsapp text-2xl"></i>
                        Purchase via WhatsApp
                    </a>

                    <a href="mailto:contact@bigstephgems.com?subject=Purchase Inquiry: {{ product.name }}" 
                       class="w-full flex items-center justify-center gap-3 border border-gray-600 hover:border-gray-400 text-gray-300 hover:text-white px-8 py-4 rounded uppercase tracking-wider transition duration-300">
                        <i class="fa-solid fa-envelope text-xl"></i>
                        Inquire via Email
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
