{% extends 'shop/base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
    <div class="flex flex-col md:flex-row gap-16 items-center">
        
        <div class="md:w-1/2 w-full">
            <div class="rounded-xl overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5 bg-neutral-900/50 p-2 backdrop-blur-sm">
                {% if product.image %}
                    <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-full h-auto object-cover rounded-lg">
                {% endif %}
            </div>
        </div>

        <div class="md:w-1/2 flex flex-col justify-center">
            <h1 class="text-4xl md:text-5xl font-serif text-white mb-4 tracking-wide">{{ product.name }}</h1>
            
            <p class="text-3xl text-yellow-500 mb-4 font-medium">₦{{ product.price }}</p>
            
            <!-- NEW QUANTITY INDICATOR -->
            <div class="mb-8">
                <span class="inline-block border border-neutral-700 text-neutral-400 px-4 py-1 rounded-full text-xs uppercase tracking-widest">
                    Available Stock: {{ product.quantity_in_stock }}
                </span>
            </div>
            
            <div class="prose prose-invert mb-12 text-neutral-400 font-light leading-relaxed">
                {{ product.details|linebreaks }}
            </div>

            <div class="space-y-4">
                <a href="https://wa.me/2348000000000?text=Hello%20Big%20Steph%20Gems!%20I%20am%20interested%20in%20purchasing%20the%20*{{ product.name|urlencode }}*%20for%20%E2%82%A6{{ product.price }}." 
                   target="_blank" 
                   class="w-full flex items-center justify-center gap-3 bg-[#25D366] hover:bg-[#1ebe57] text-black px-8 py-4 rounded-md font-bold uppercase text-sm tracking-wider transition duration-300 shadow-[0_8px_20px_rgba(37,211,102,0.15)] hover:shadow-[0_12px_25px_rgba(37,211,102,0.3)]">
                    <i class="fa-brands fa-whatsapp text-xl"></i>
                    Purchase via WhatsApp
                </a>

                <a href="mailto:contact@bigstephgems.com?subject=Purchase Inquiry: {{ product.name }}" 
                   class="w-full flex items-center justify-center gap-3 border border-neutral-700 hover:border-yellow-500 text-neutral-300 hover:text-yellow-500 px-8 py-4 rounded-md font-semibold uppercase text-sm tracking-wider transition duration-300 bg-neutral-900/50">
                    <i class="fa-solid fa-envelope text-lg"></i>
                    Inquire via Email
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
