<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIG STEPH GEMS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-900 text-neutral-100 font-sans antialiased">

    <nav class="bg-black/90 backdrop-blur-md sticky top-0 z-50 border-b border-yellow-700/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0">
                    <a href="/" class="text-2xl font-serif font-bold text-yellow-500 tracking-widest uppercase">
                        Big Steph Gems
                    </a>
                </div>
                
                <div class="hidden md:flex space-x-8">
                    <a href="/" class="text-gray-300 hover:text-yellow-500 transition duration-300 uppercase text-sm tracking-wider">Collection</a>
                    <a href="#" class="text-gray-300 hover:text-yellow-500 transition duration-300 uppercase text-sm tracking-wider">About</a>
                </div>

                <div class="md:hidden flex items-center">
                    <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="text-yellow-500 hover:text-yellow-400 focus:outline-none">
                        <i class="fa-solid fa-bars text-2xl"></i>
                    </button>
                </div>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-neutral-900 border-b border-yellow-700/30">
            <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3">
                <a href="/" class="block px-3 py-2 text-gray-300 hover:text-yellow-500 uppercase tracking-wider text-sm">Collection</a>
                <a href="#" class="block px-3 py-2 text-gray-300 hover:text-yellow-500 uppercase tracking-wider text-sm">About</a>
            </div>
        </div>
    </nav>

    <div class="py-20 text-center">
        <h1 class="text-5xl font-serif text-yellow-500 mb-4">The Imperial Collection</h1>
        <p class="text-gray-400 max-w-2xl mx-auto font-light tracking-wide">Discover our exclusive range of handcrafted, premium jewelry.</p>
    </div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-24">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-10">
            
            {% for product in products %}
            <div class="group bg-neutral-800 border border-neutral-700/50 rounded-lg overflow-hidden hover:-translate-y-2 transition duration-500 hover:shadow-[0_10px_40px_-15px_rgba(234,179,8,0.3)]">
                <div class="aspect-w-1 aspect-h-1 w-full overflow-hidden bg-neutral-700 xl:aspect-w-7 xl:aspect-h-8">
                    {% if product.image %}
                        <img src="{{ product.image.url }}" alt="{{ product.name }}" class="h-80 w-full object-cover object-center group-hover:scale-105 transition duration-700">
                    {% else %}
                        <div class="h-80 w-full flex items-center justify-center text-gray-500">No Image</div>
                    {% endif %}
                </div>
                <div class="p-6 text-center">
                    <h3 class="text-xl font-serif text-gray-100 mb-2">{{ product.name }}</h3>
                    <p class="text-yellow-500 font-semibold text-lg mb-6">₦{{ product.price }}</p>
                    <a href="{% url 'product_detail' product.id %}" class="inline-block border border-yellow-500 text-yellow-500 px-6 py-2 uppercase text-xs tracking-widest hover:bg-yellow-500 hover:text-black transition duration-300">View Details</a>
                </div>
            </div>
            {% endfor %}

        </div>
    </div>
</body>
</html>
